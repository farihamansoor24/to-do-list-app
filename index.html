<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart To-Do List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<!-- Header -->
<div class="header">

  <div class="header-left">
      <h2 class="app-title fs-5 fw-bold"><img src="logo.png" alt="Logo" width="50" height="40" /> To-Do List</h2>
   

    <!-- <div class="mini-stats mt-3">
      <span>Total: <b id="h-total">0</b></span>
      <span class="pending">Pending: <b id="h-pending">0</b></span>
      <span class="completed">Done: <b id="h-completed">0</b></span>
    </div> -->
  </div>

  <div class="header-right">
     <h2 class="fs-5 fw-semibold" id="greeting">Good Morning! <img src="https://i.pravatar.cc/50" alt="profile"></h2>
    <p id="today-date">Monday, 22 June 2026</p>

  </div>

</div>

  <!-- Stats -->
  <div class="stats">

    <div class="card">
      <i class="bi bi-list-task text-white"></i>
      <h2 id="total-tasks">0</h2>
      <p>Total Tasks</p>
    </div>

    <div class="card">
      <i class="bi bi-clock-history text-white"></i>
      <h2 id="pending-tasks">0</h2>
      <p>Pending</p>
    </div>

    <div class="card">
      <i class="bi bi-check-circle text-white"></i>
      <h2 id="completed-tasks">0</h2>
      <p>Completed</p>
    </div>

  </div>
<div class="msg my-2 fw-semibold fs-5" id="msg"></div>
  <!-- Add Task -->
  <div class="add-task">
    <input type="text" id="todo-input" placeholder="Enter your task...">

    <select id="priority-select">
      <option value="high">High Priority</option>
      <option value="medium">Medium Priority</option>
      <option value="low">Low Priority</option>
    </select>

    <button id="addBtn">Add Task</button>
  </div>

  <!-- Search -->
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search tasks..." >
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="active" id="all-btn" type="button">All</button>
    <button id="pending-btn" type="button">Pending</button>
    <button id="completed-btn" type="button">Completed</button>
  </div>

  <!-- Tasks -->
  <div class="tasks" id="tasks-container">
<!-- Tasks will be displayed here -->
    
  </div>


</div>

<!-- Modal Box for Edit task -->
<div class="modal fade" id="editTaskModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit Task</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" name="editTaskId" class="taskHiddenId">
        <input type="text" id="editInput" class="form-control" placeholder="Update task">
    <select id="editPrioritySelect" class="form-select mt-3">
      <option value="high">High Priority</option>
      <option value="medium">Medium Priority</option>
      <option value="low">Low Priority</option>
    </select>
    <div class="mt-3">
      <input type="radio" name="action" value="pending" class="form-check-input"> <label class="form-check-label">Pending</label>
      <input type="radio" name="action" value="completed" class="form-check-input"> <label class="form-check-label">Completed</label>
    </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" data-bs-dismiss="modal" id="saveBtn">Save</button>
      </div>

    </div>
  </div>
</div>
    <!-- bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="index.js"></script>
</body>
</html>
